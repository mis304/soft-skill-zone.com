<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SOFT SKILL ZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="brand-wrap" style="align-items:center;display:inline-flex;">
          <span class="brand">SOFT SKILL <span class="gold">ZONE</span></span>
          <span class="brand-sub">Learn AI.. Lead Future.</span>
        </a>
      </div>
      <div class="form-card">
        <h2 style="text-align:center;margin-bottom:6px;">Welcome back</h2>
        <p class="muted" style="text-align:center;margin-bottom:22px;font-size:14px;">Login to your account</p>
        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" required autocomplete="username" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" required autocomplete="current-password" placeholder="Your password" />
          </div>
          <button type="submit" class="btn btn-gold btn-block" id="loginBtn">Login</button>
        </form>
        <p style="text-align:center;margin-top:18px;">
          <a href="index.html" class="muted" style="font-size:13px;">← Back to website</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (function () {
      // already logged in? go to the right dashboard
      if (Auth.isLoggedIn()) {
        location.href = Auth.getRole() === "admin" ? "admin.html" : "student.html";
      }
      var form = document.getElementById("loginForm");
      var btn = document.getElementById("loginBtn");
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;
        if (!email || !password) { UI.toast("Enter email and password", "err"); return; }
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in…';
        try {
          var session = await api("login", { email: email, password: password });
          Auth.save(session);
          UI.toast("Welcome, " + (session.name || "") + "!", "ok");
          setTimeout(function () {
            location.href = session.role === "admin" ? "admin.html" : "student.html";
          }, 500);
        } catch (err) {
          UI.toast(err.message || "Login failed", "err");
          btn.disabled = false; btn.textContent = "Login";
        }
      });
    })();
  </script>
</body>
</html>
